openapi: "3.1.0"
info:
  title: E-commerce API
  version: "1.0.0"
  description: Products, cart, orders, and checkout for a standard e-commerce platform.

servers:
  - url: https://api.example.com/v1

tags:
  - name: products
  - name: cart
  - name: orders

paths:
  /products:
    get:
      tags: [products]
      summary: List products
      operationId: listProducts
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: minPrice
          in: query
          schema: { type: number, minimum: 0 }
        - name: maxPrice
          in: query
          schema: { type: number }
        - name: inStock
          in: query
          schema: { type: boolean }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductListResponse" }

  /products/{id}:
    get:
      tags: [products]
      summary: Get product
      operationId: getProduct
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductResponse" }

  /cart:
    get:
      tags: [cart]
      summary: Get current cart
      operationId: getCart
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Cart contents
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CartResponse" }
    post:
      tags: [cart]
      summary: Add item to cart
      operationId: addToCart
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddToCartRequest" }
      responses:
        "200":
          description: Cart updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CartResponse" }

  /cart/{itemId}:
    delete:
      tags: [cart]
      summary: Remove item from cart
      operationId: removeFromCart
      security: [{ BearerAuth: [] }]
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Cart updated

  /orders:
    get:
      tags: [orders]
      summary: List user orders
      operationId: listOrders
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrderListResponse" }
    post:
      tags: [orders]
      summary: Place order from cart
      operationId: placeOrder
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlaceOrderRequest" }
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrderResponse" }

  /orders/{id}:
    get:
      tags: [orders]
      summary: Get order details
      operationId: getOrder
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrderResponse" }

components:
  schemas:
    Product:
      type: object
      required: [id, name, price, currency, inStock]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        price: { type: number, minimum: 0 }
        currency: { type: string, example: USD }
        imageUrl: { type: string, format: uri, nullable: true }
        category: { type: string }
        inStock: { type: boolean }
        stockCount: { type: integer, minimum: 0 }

    ProductResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Product" }

    ProductListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Product" }
        meta:
          type: object
          properties:
            total: { type: integer }
            page: { type: integer }
            limit: { type: integer }

    CartItem:
      type: object
      required: [id, product, quantity, unitPrice]
      properties:
        id: { type: string, format: uuid }
        product: { $ref: "#/components/schemas/Product" }
        quantity: { type: integer, minimum: 1 }
        unitPrice: { type: number }

    Cart:
      type: object
      required: [items, subtotal, currency]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CartItem" }
        subtotal: { type: number }
        currency: { type: string }

    CartResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Cart" }

    AddToCartRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: string, format: uuid }
        quantity: { type: integer, minimum: 1 }

    Order:
      type: object
      required: [id, status, items, total, currency, createdAt]
      properties:
        id: { type: string, format: uuid }
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
        items:
          type: array
          items: { $ref: "#/components/schemas/CartItem" }
        total: { type: number }
        currency: { type: string }
        shippingAddress: { $ref: "#/components/schemas/Address" }
        createdAt: { type: string, format: date-time }

    Address:
      type: object
      required: [line1, city, country, postalCode]
      properties:
        line1: { type: string }
        line2: { type: string, nullable: true }
        city: { type: string }
        state: { type: string, nullable: true }
        country: { type: string }
        postalCode: { type: string }

    PlaceOrderRequest:
      type: object
      required: [shippingAddress, paymentMethodId]
      properties:
        shippingAddress: { $ref: "#/components/schemas/Address" }
        paymentMethodId: { type: string }

    OrderResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Order" }

    OrderListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Order" }

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
