openapi: "3.1.0"
info:
  title: Admin API
  version: "1.0.0"
  description: Admin panel endpoints for user management, feature flags, and audit logs.

servers:
  - url: https://api.example.com/v1/admin

tags:
  - name: admin-users
  - name: feature-flags
  - name: audit

paths:
  /users:
    get:
      tags: [admin-users]
      summary: List all users
      operationId: adminListUsers
      security: [{ BearerAuth: [] }]
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema:
            type: string
            enum: [active, suspended, deleted]
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUserListResponse" }

  /users/{id}:
    get:
      tags: [admin-users]
      summary: Get user detail
      operationId: adminGetUser
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUserResponse" }

  /users/{id}/suspend:
    post:
      tags: [admin-users]
      summary: Suspend user
      operationId: suspendUser
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "204": { description: User suspended }

  /users/{id}/unsuspend:
    post:
      tags: [admin-users]
      summary: Unsuspend user
      operationId: unsuspendUser
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: User unsuspended }

  /feature-flags:
    get:
      tags: [feature-flags]
      summary: List feature flags
      operationId: listFeatureFlags
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Feature flags
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeatureFlagListResponse" }
    post:
      tags: [feature-flags]
      summary: Create feature flag
      operationId: createFeatureFlag
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateFeatureFlagRequest" }
      responses:
        "201":
          description: Feature flag created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeatureFlagResponse" }

  /feature-flags/{key}:
    patch:
      tags: [feature-flags]
      summary: Toggle feature flag
      operationId: toggleFeatureFlag
      security: [{ BearerAuth: [] }]
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: Flag updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeatureFlagResponse" }

  /audit-logs:
    get:
      tags: [audit]
      summary: Get audit logs
      operationId: getAuditLogs
      security: [{ BearerAuth: [] }]
      parameters:
        - name: userId
          in: query
          schema: { type: string, format: uuid }
        - name: action
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditLogListResponse" }

components:
  schemas:
    AdminUser:
      type: object
      required: [id, email, name, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        status: { type: string, enum: [active, suspended, deleted] }
        role: { type: string }
        lastLoginAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

    AdminUserResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/AdminUser" }

    AdminUserListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AdminUser" }
        meta:
          type: object
          properties:
            total: { type: integer }

    FeatureFlag:
      type: object
      required: [key, enabled, createdAt]
      properties:
        key: { type: string }
        description: { type: string, nullable: true }
        enabled: { type: boolean }
        rolloutPercentage: { type: integer, minimum: 0, maximum: 100 }
        createdAt: { type: string, format: date-time }

    CreateFeatureFlagRequest:
      type: object
      required: [key]
      properties:
        key: { type: string, pattern: "^[a-z][a-z0-9_]*$" }
        description: { type: string }
        enabled: { type: boolean, default: false }

    FeatureFlagResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/FeatureFlag" }

    FeatureFlagListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/FeatureFlag" }

    AuditLog:
      type: object
      required: [id, action, userId, createdAt]
      properties:
        id: { type: string, format: uuid }
        action: { type: string }
        userId: { type: string, format: uuid }
        resourceType: { type: string, nullable: true }
        resourceId: { type: string, nullable: true }
        metadata: { type: object, additionalProperties: true }
        ipAddress: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    AuditLogListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AuditLog" }

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
