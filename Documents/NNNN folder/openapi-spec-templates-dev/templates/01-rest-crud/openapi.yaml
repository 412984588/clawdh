openapi: "3.1.0"
info:
  title: REST CRUD API
  version: "1.0.0"
  description: Standard Create, Read, Update, Delete API for a generic resource.

servers:
  - url: https://api.example.com/v1
    description: Production
  - url: https://staging-api.example.com/v1
    description: Staging

tags:
  - name: items
    description: Item management

paths:
  /items:
    get:
      tags: [items]
      summary: List items
      operationId: listItems
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Paginated list of items
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ItemListResponse" }
    post:
      tags: [items]
      summary: Create item
      operationId: createItem
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateItemRequest" }
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ItemResponse" }
        "422":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationError" }

  /items/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [items]
      summary: Get item
      operationId: getItem
      responses:
        "200":
          description: Item found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ItemResponse" }
        "404":
          description: Item not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    patch:
      tags: [items]
      summary: Update item
      operationId: updateItem
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateItemRequest" }
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ItemResponse" }
    delete:
      tags: [items]
      summary: Delete item
      operationId: deleteItem
      responses:
        "204":
          description: Item deleted
        "404":
          description: Item not found

components:
  schemas:
    Item:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 255 }
        description: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateItemRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        description: { type: string }

    UpdateItemRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        description: { type: string, nullable: true }

    ItemResponse:
      type: object
      required: [data]
      properties:
        data: { $ref: "#/components/schemas/Item" }

    ItemListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Item" }
        meta: { $ref: "#/components/schemas/PaginationMeta" }

    PaginationMeta:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }

    ValidationError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details]
          properties:
            code: { type: string, example: VALIDATION_ERROR }
            message: { type: string }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  message: { type: string }

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
