name: Weekly Load Tests

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      duration:
        description: "Test duration (quick|full)"
        required: false
        default: "quick"
      base_url:
        description: "Target base URL"
        required: false
        default: "http://localhost:8911"

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C49143877B50
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm build

      - name: Start services
        run: |
          pnpm doctor
          node apps/bridge-daemon/dist/cli.js start &
          sleep 5

      - name: Run load tests
        run: |
          chmod +x tests/load/run.sh
          DURATION=${{ github.event.inputs.duration || 'quick' }} ./tests/load/run.sh all
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:8911' }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET || 'ci-test-secret' }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: tests/load/results/
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          echo "## Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run completed at: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "tests/load/results" ]; then
            echo "### Test Logs" >> $GITHUB_STEP_SUMMARY
            for log in tests/load/results/*.log; do
              if [ -f "$log" ]; then
                echo "#### $(basename $log)" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                tail -50 "$log" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
              fi
            done
          fi

  notify:
    needs: load-test
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Notify on failure
        run: |
          echo "Load tests failed. Check the workflow logs for details."
